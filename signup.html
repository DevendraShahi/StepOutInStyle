<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .login-container-wrapper {
            position: relative;
            background: linear-gradient(90deg, #efd5ff 0%, #515ada 100%);
            height: 100%;
            /* padding: 4rem; */
        }

.circles{
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
}

.circles li{
    position: absolute;
    display: block;
    list-style: none;
    width: 80px;
    height: 80px;
    /* background: rgba(255, 255, 255, 0.2); */
    animation: animate 25s linear infinite;
    bottom: -150px;
    background-size: contain;
    background-repeat: no-repeat;
}

.circles li:nth-child(1){
    left: 25%;
    /* width: 80px; */
    /* height: 80px; */
    animation-delay: 0s;
    background-image: url('img/fly-football.jpeg');
}


.circles li:nth-child(2){
    left: 10%;
    /* width: 20px; */
    /* height: 20px; */
    animation-delay: 2s;
    animation-duration: 12s;
    background-image: url('img/fly-women.jpeg');
}

.circles li:nth-child(3){
    left: 70%;
    /* width: 20px; */
    /* height: 20px; */
    animation-delay: 4s;
    background-image: url('img/fly-jordan.jpeg');
}

.circles li:nth-child(4){
    left: 40%;
    /* width: 60px; */
    /* height: 60px; */
    animation-delay: 0s;
    animation-duration: 18s;
    background-image: url('img/fly-nike.jpeg');
}

.circles li:nth-child(5){
    left: 65%;
    /* width: 20px; */
    /* height: 20px; */
    animation-delay: 0s;
    background-image: url('img/fly-men.jpeg');
}

.circles li:nth-child(6){
    left: 75%;
    /* width: 110px; */
    /* height: 110px; */
    animation-delay: 9s;
    background-image: url('img/fly-sliipers.jpeg');
}

.circles li:nth-child(7){
    left: 35%;
    /* width: 150px; */
    /* height: 150px; */
    animation-delay: 7s;
    background-image: url('img/fly-converse.jpeg');
}

.circles li:nth-child(8){
    left: 50%;
    /* width: 25px; */
    /* height: 25px; */
    animation-delay: 15s;
    animation-duration: 45s;
    background-image: url('img/fly-boot.jpeg');
}

.circles li:nth-child(9){
    left: 20%;
    /* width: 15px; */
    /* height: 15px; */
    animation-delay: 2s;
    animation-duration: 35s;
    background-image: url('img/fly-kids.jpeg');
}

.circles li:nth-child(10){
    left: 85%;
    /* width: 150px; */
    /* height: 150px; */
    animation-delay: 0s;
    animation-duration: 11s;
    background-image: url('img/fly-crocs.jpeg');
}



@keyframes animate {

    0%{
        transform: translateY(0) rotate(0deg);
        opacity: 0;
        border-radius: 0;
    }

    70%{
        opacity: 1;
    }

    100%{
        transform: translateY(-1000px) rotate(720deg);
        border-radius: 50%;
    }

}

        .login-container {
            background-image: url('img/step-login.png');
            background-repeat: no-repeat;
            width: 100%;
            height: 88vh;
            background-size: contain;
            background-position: 60% 80%;
            display: flex;
            align-items: center;
            padding: 2rem;
        }

        .login-body {
            z-index: 1;
            padding: 1rem;
            display: flex;
            flex-flow: column;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            width: 30%;
            gap: 1.2rem;
            border-radius: 1rem;
        }

        .login-container h1 {
            color: white;
            margin: 0;
            padding: 0 0 1rem 0;
            border-bottom: 1px solid white;
        }

        form {
            display: flex;
            flex-flow: column;
            gap: 1rem;
            justify-content: space-around;
        }

        form input {
            padding-left: 0.5rem;
            height: 3rem;
            border: none;
            border-radius: 0.5rem;
            box-shadow: rgba(50, 50, 93, 0.25) 0px 13px 27px -5px, rgba(0, 0, 0, 0.3) 0px 8px 16px -8px;
            width: 100%;
            font-weight: 500;
            font-size: 1rem;
        }

        .login-body p{
            text-align: center;
            color: rgba(0, 0, 0, 0.5);
        }

        .login-body #signin{
            text-decoration: none;
            color: orangered;
            cursor: pointer;
        }
        .login-body #signin:hover{
            text-decoration: underline;
        }

    </style>
</head>

<body>
    <div class="login-container-wrapper">
        <div class="login-container">
            <div class="login-body">
                <h1>SignUp</h1>
                <form action="">
                    <input type="text" name="username" placeholder="Username">
                    <input type="email" name="email" placeholder="Email">
                    <input type="password" name="password" placeholder="Password">
                    <input type="password" name="password_confirmation" placeholder="Confirm Password">
                    <p>Don't have account? <span id="signin" onclick="loadSignin()">Sign In</span></p>
                </form>
            </div>
        </div>
        <ul class="circles">
                <li></li>
                <li></li>
                <li></li>
                <li></li>
                <li></li>
                <li></li>
                <li></li>
                <li></li>
                <li></li>
                <li></li>
        </ul>
    </div>

    <script>
        function loadSignin(){
            fetch('login.html')
            .then(response => response.text())
            .then(data => {
                const bodyMain = $('main');
                const bodyFooter = $('footer');
                bodyMain.html(data);
                bodyFooter.remove();
            });
        }
    </script>
</body>

</html>
